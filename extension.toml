id = "json-sort"
name = "JSON Sort"
version = "0.1.0"
schema_version = 1
description = "Sort JSON keys recursively + string arrays alphabetically. Supports JSON, JSONC, JSON5. VS Code-like 'Sort JSON' command for Zed."
authors = ["samet_yilmaz <abdussamet14@gmail.com>"]
repository = "https://github.com/sametYILMAZ97/zed-ext-JSON-sort"

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.json-sort-server]
name = "JSON Sort"
language = "JSON"
languages = ["JSON", "JSONC"]

[language_servers.json-sort-server.language_ids]
"JSON" = "json"
"JSONC" = "jsonc"
